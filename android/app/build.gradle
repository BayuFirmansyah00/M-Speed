plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    id "org.jetbrains.kotlin.plugin.compose" version "2.0.21"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

android {
    namespace = "com.mitrakaryaprima.mspeed"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
    
     kotlinOptions {
        jvmTarget = 17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.mitrakaryaprima.mspeed"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
        multiDexEnabled true
    }

    signingConfigs{
        release{
            storeFile file('../mspeed-keystore.jks')
            storePassword "mspeed"
            keyAlias = "mspeed"
            keyPassword "mspeed"
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            // aaptOptions {
            //     ignoreAssetsPattern '!mlkit_pose:!mlkit_label_default_model:!hobbes.tflite:'
            // }
        }
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            // signingConfig = signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            signingConfig = signingConfigs.release

            // aaptOptions {
            //     ignoreAssetsPattern '!mlkit_pose:!mlkit_label_default_model:!hobbes.tflite:'
            // }
            ndk {
                abiFilters 'armeabi-v7a', 'x86_64', 'arm64-v8a'
            }
            // packagingOptions {
            //     exclude 'lib/**/libtranslate_jni.so'
            //     exclude 'lib/**/libdigitalink.so'
            //     exclude 'lib/**/libxeno_native.so'
            //     exclude 'lib/**/libmlkitcommonpipeline.so'
            //     exclude 'lib/**/libbarhopper_v2.so'
            //     exclude 'lib/**/libclassifier_jni.so'
            //     exclude 'lib/**/libpredictor_jni.so'
            //     exclude 'lib/**/libtextclassifier3_jni_tclib.so'
            //     // exclude 'lib/**/libface_detector_v2_jni.so'
            //     exclude 'lib/**/libtensorflowlite_jni.so'
            //     exclude 'lib/**/liblanguage_id_jni.so'
            //     exclude 'assets/hobbes.tflite'
            //     resources.excludes.add("META-INF/*")
            // }
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
    implementation "androidx.compose.runtime:runtime:1.8.0"
    implementation 'androidx.window:window:1.3.0'
    implementation 'androidx.window:window-java:1.3.0'
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version"
    implementation platform('com.google.firebase:firebase-bom:33.13.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation fileTree(dir: '../libs', include: ['*.jar', '*.aar'])
    
    implementation "me.leolin:ShortcutBadger:1.1.22@aar"
    implementation 'com.android.support:multidex:1.0.3'
    implementation platform('com.google.firebase:firebase-bom:33.13.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-crashlytics'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.1'
    implementation 'androidx.core:core-ktx:1.16.0'

    implementation "androidx.camera:camera-camera2:1.4.2"
    implementation "androidx.camera:camera-lifecycle:1.4.2"
    implementation "androidx.camera:camera-view:1.4.2"
    implementation 'com.google.guava:guava:33.4.0-android'
//    implementation 'com.google.android.gms:play-services-mlkit-face-detection:16.2.1'
    implementation 'com.airbnb.android:lottie:5.2.0'

    // Tensorflow Lite dependencies for Google Play services
    // implementation 'com.google.android.gms:play-services-tflite-java:16.0.1'
    // Optional: include Tensorflow Lite Support Library
    // implementation 'com.google.android.gms:play-services-tflite-support:16.0.1'

    implementation 'com.google.android.play:integrity:1.4.0'
    implementation ('com.google.apis:google-api-services-playintegrity:v1-rev20230105-2.0.0') {
        //Exclude conflicting modules
        exclude module: 'httpclient'
        exclude module: 'commons-logging'
    }
    implementation ('com.google.auth:google-auth-library-oauth2-http:1.16.1') {
        //Exclude conflicting modules
        exclude module: 'httpclient'
        exclude module: 'commons-logging'
    }
    implementation ('com.google.api-client:google-api-client-jackson2:1.20.0') {
        //Exclude conflicting modules
        exclude module: 'httpclient'
        exclude module: 'commons-logging'
    }
}
